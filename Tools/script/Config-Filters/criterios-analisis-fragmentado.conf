; ==============================================================================
; CRITERIOS DE ANALISIS FRAGMENTADO (Protocolo Fénix)
; ==============================================================================
; Estos criterios se aplican sobre el archivo 'resumen-fragmentacion.csv'
; para determinar si un set es consistente en el tiempo.

[FILTROS_DUROS]
; El Full-time debe ser rentable (Net Profit > 0)
full_time_min_profit = 0.0
; Profit Factor mínimo del periodo completo
full_time_min_pf = 1.10
; Máximo Drawdown de Equidad (%) permitido en el periodo completo
full_time_max_dd_pct = 15.0

[CONSISTENCIA]
; Ratio de años positivos (0.70 = 70% de los fragmentos deben ser verdes)
min_consistency_ratio = 0.66
; Máxima pérdida permitida en UN SOLO año (USD)
max_yearly_loss_usd = 150.0
; Máximo Drawdown de Equidad (%) permitido en CADA año individual
max_yearly_dd_pct = 20.0

[PESOS_SCORING]
; Pesos para el ranking final (si pasan los filtros duros)
weight_profit = 1.0
weight_consistency = 2.0
weight_sharpe = 1.5
