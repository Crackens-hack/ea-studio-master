# ==============================================================================
# criterios-de-rescate-forward.conf
# Filtros de RESCATE para cuando no hubo convergencia de ADN (C_Cruce_Pass = vacío).
# Se aplican SOLO al Forward. Son MÁS DUROS que los criterios estándar
# para compensar la ausencia de validación genética cruzada.
# ==============================================================================

[M15]
# Sin proporcional por años. El forward ya tiene periodo fijo.
# Trades absolutos mínimos esperados (60 = 2.5/mes en 2 años, no se relaja)
TRADES_ABSOLUTAS = 60
# Profit mínimo: igual de exigente
PROFIT_MIN = 0.01
# Profit Factor: sube de 1.25 a 1.40 (el bot debe ser notablemente eficiente)
PROFIT_FACTOR_MIN = 1.40
# Expected Payoff: sube de 0.50 a 1.0 (cada trade debe aportar más)
EXPECTED_PAYOFF_MIN = 1.00
# Drawdown: baja de 15% a 10% (menos tolerancia sin validación genética)
EQUITY_DD_MAX = 10.0
# Sharpe: sube de 1.2 a 2.0 (curva de equity casi lineal obligatoria)
SHARPE_MIN = 2.0
# Recovery Factor: sube de 1.5 a 2.5 (debe recuperar 2.5x su peor caída)
RECOVERY_FACTOR_MIN = 2.5

[H1]
TRADES_ABSOLUTAS = 30
PROFIT_MIN = 0.01
PROFIT_FACTOR_MIN = 1.35
EXPECTED_PAYOFF_MIN = 2.00
EQUITY_DD_MAX = 12.0
SHARPE_MIN = 1.5
RECOVERY_FACTOR_MIN = 2.0

[H4]
TRADES_ABSOLUTAS = 12
PROFIT_MIN = 0.01
PROFIT_FACTOR_MIN = 1.30
EXPECTED_PAYOFF_MIN = 4.00
EQUITY_DD_MAX = 15.0
SHARPE_MIN = 1.2
RECOVERY_FACTOR_MIN = 1.8

[D1]
TRADES_ABSOLUTAS = 6
PROFIT_MIN = 0.01
PROFIT_FACTOR_MIN = 1.25
EXPECTED_PAYOFF_MIN = 8.00
EQUITY_DD_MAX = 18.0
SHARPE_MIN = 1.0
RECOVERY_FACTOR_MIN = 1.5
