# ==============================================================================
# criterios-minimos-post-forward.conf
# Filtros mínimos de calidad para el análisis Post-Forward (B_Analista_Post_Forward.py)
# El script calcula los trades mínimos automáticamente: TRADES_ANUALES * años_periodo
# ==============================================================================

[M15]
# Trades esperados por año para una estrategia de reversión M15
TRADES_ANUALES = 30
# Profit mínimo (en cualquier moneda) para que no sea un "break-even muerto"
PROFIT_MIN = 0.01
# Profit Factor mínimo (1.25 = por cada $1 perdido, gana $1.25)
PROFIT_FACTOR_MIN = 1.25
# Expected Payoff mínimo por trade (no aceptamos cents ganados por disparo)
EXPECTED_PAYOFF_MIN = 0.50
# Drawdown máximo relativo aceptado (%)
EQUITY_DD_MAX = 15.0
# Sharpe Ratio mínimo (curva de equity no puede ser una montaña rusa)
SHARPE_MIN = 1.2
# Recovery Factor mínimo (debe ganar al menos 2x su peor caída)
RECOVERY_FACTOR_MIN = 1.5

[H1]
TRADES_ANUALES = 15
PROFIT_MIN = 0.01
PROFIT_FACTOR_MIN = 1.20
EXPECTED_PAYOFF_MIN = 1.00
EQUITY_DD_MAX = 20.0
SHARPE_MIN = 1.0
RECOVERY_FACTOR_MIN = 1.5

[H4]
TRADES_ANUALES = 6
PROFIT_MIN = 0.01
PROFIT_FACTOR_MIN = 1.20
EXPECTED_PAYOFF_MIN = 2.00
EQUITY_DD_MAX = 20.0
SHARPE_MIN = 0.8
RECOVERY_FACTOR_MIN = 1.3

[D1]
TRADES_ANUALES = 3
PROFIT_MIN = 0.01
PROFIT_FACTOR_MIN = 1.15
EXPECTED_PAYOFF_MIN = 5.00
EQUITY_DD_MAX = 25.0
SHARPE_MIN = 0.5
RECOVERY_FACTOR_MIN = 1.2