; ==============================================================================
; 🏛️ MANUAL DEL PILOTO - PIPELINE
; ==============================================================================
;
; 1. SWITCHES MAESTROS (Globales)
; ------------------------------------------------------------------------------
; Autonormalizer                  = True  | Activa el Normalizador Master tras el test.
; AutoCargador                    = True  | Habilita el bucle de "Munición" (Auto-Carga de .set).
; MODOS_AUTOMATICOS_DERIBADOS     = True  | Permite encadenar modos usando {posicionN}.
; AutoFilter_Genetico_Post_Forward = True  | Activa el cálculo de ratio [X/Y] para el Orquestador.
; AutoFilter_MODO_FRAGMENTADO     = True  | Invoca al Juez Forense tras la validación fragmentada.
; Comando_fulltime                = True  | Obliga a correr un reporte del periodo total.
;
; 2. ETIQUETAS DE ACCIÓN (Tags en posicionX)
; ------------------------------------------------------------------------------
; _AUTO_NZER_       | Dispara el normalizador para ese modo específico.
; Fragmentacion      | Realiza una Auditoría Anual (Backtest año a año).
; Full_time          | Ejecuta una corrida del rango histórico completo.
; preset             | Indica que el modo requiere cargar un archivo .set externo.
; _AutoCargador_     | Activa el bucle secuencial de cartuchos en este modo.
;
; 3. LÓGICA DE FILTRADO Y RATIO
; ------------------------------------------------------------------------------
; _Auto_Filter_Gen_For[X/Y]_ 
;   Ejemplo: [1/3] sobre 6 años.
;   - Forward  = 6 * (1/3) = 2 años.
;   - Backtest = 6 - 2     = 4 años.
;   Inyecta automáticamente estos valores al Orquestador Maestro (B_Master...).
;
; 4. DERIVACIÓN (Eslabón de Cadena)
; ------------------------------------------------------------------------------
; {posicionN}         | Al terminar, salta a la posicion N usando el primer rango.
; {posicionN:_rango}  | Salta a la posicion N inyectando un rango específico (ej: _12años).
;
; NOTA: El sistema recuerda EA, Símbolo, Timeframe y Modelo entre derivaciones.
; ==============================================================================
